<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baldi's Basics</title>
</head>
<body>
    <style>
        /* Make iframe responsive */
        .game-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
        }
        .game-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        body {
            background-color: #328ce0;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
         button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <button onclick="history.back()">Go Back</button>
    <h1>Baldi's Basics</h1>
    <div class="game-container">
        <iframe 
            src="https://michaelsoft1853.github.io/baldi-s-basics-webgl/"
            allowfullscreen 
            loading="lazy"
            sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-popups">
        </iframe>
    </div>
iframe fullscreen
<button onclick="goFullscreen()">Go Fullscreen</button>

<script>
function goFullscreen() {
    const iframe = document.querySelector('iframe');
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    } else if (iframe.mozRequestFullScreen) { // Firefox
        iframe.mozRequestFullScreen();
    } else if (iframe.webkitRequestFullscreen) { // Chrome, Safari
        iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) { // IE/Edge
        iframe.msRequestFullscreen();
    }
}
</script>
<iframe src="https://michaelsoft1853.github.io/baldi-s-basics-webgl/" allowfullscreen sandbox="allow-scripts allow-pointer-lock"></iframe>
</body>
</html>
